  <rect x="100" y="330" width="160" height="100" fill="#000" stroke="#141414"/>
  <text x="180" y="360" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">config/</text>
  <text x="180" y="382" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">config · db</text>
  <text x="180" y="400" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">security · CSP</text>

  <rect x="280" y="330" width="160" height="100" fill="#000" stroke="#141414"/>
  <text x="360" y="360" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">includes/</text>
  <text x="360" y="382" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">functions · blog</text>
  <text x="360" y="400" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">header · footer</text>

  <rect x="460" y="330" width="180" height="100" fill="#000" stroke="#141414"/>
  <text x="550" y="355" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">public/</text>
  <text x="550" y="375" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">auth · forum · blog</text>
  <text x="550" y="393" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">pages · images</text>
  <text x="550" y="411" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">css · js · uploads</text>

  <rect x="660" y="330" width="190" height="100" fill="#000" stroke="#ff0033" stroke-opacity="0.5"/>
  <text x="755" y="360" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">UI / Design</text>
  <text x="755" y="382" text-anchor="middle" fill="#ff0033" font-family="ui-monospace,monospace" font-size="10">#000 · #ff0033</text>
  <text x="755" y="400" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">JetBrains Mono</text>
  <text x="755" y="418" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">style.css tokens</text>

  <line x1="480" y1="460" x2="480" y2="500" stroke="#ff0033" stroke-width="1"/>
  <polygon points="480,505 474,493 486,493" fill="#ff0033"/>

  <!-- MySQL -->
  <rect x="300" y="515" width="360" height="70" fill="#050505" stroke="#ff0033" stroke-width="1.5"/>
  <text x="480" y="545" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="13">MySQL 8 · php_forum</text>
  <text x="480" y="565" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="11">users · topics · replies · blog_* · sessions</text>

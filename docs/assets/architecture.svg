<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <rect width="960" height="620" fill="#000"/>
  <text x="40" y="42" fill="#ff0033" font-family="ui-monospace,monospace" font-size="14" letter-spacing="3">ATHESIS · IMPLEMENTATION ARCHITECTURE</text>
  <text x="40" y="64" fill="#5a5650" font-family="ui-monospace,monospace" font-size="11">PHP 8.2 · Apache · MySQL 8 · Odyssey UI</text>

  <!-- Browser -->
  <rect x="360" y="90" width="240" height="50" fill="#050505" stroke="#ff0033" stroke-width="1.5"/>
  <text x="480" y="120" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="13">Browser / Client</text>

  <line x1="480" y1="140" x2="480" y2="175" stroke="#ff0033" stroke-width="1"/>
  <polygon points="480,180 474,168 486,168" fill="#ff0033"/>

  <!-- Apache -->
  <rect x="300" y="185" width="360" height="55" fill="#050505" stroke="#1a1a1a" stroke-width="1"/>
  <text x="480" y="210" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="13">Apache (Docker :8088→80)</text>
  <text x="480" y="228" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="11">mod_rewrite · static assets · public/</text>

  <line x1="480" y1="240" x2="480" y2="275" stroke="#ff0033" stroke-width="1"/>
  <polygon points="480,280 474,268 486,268" fill="#ff0033"/>

  <!-- PHP App -->
  <rect x="80" y="290" width="800" height="170" fill="#050505" stroke="#1a1a1a" stroke-width="1"/>

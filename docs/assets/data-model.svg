  <line x1="480" y1="150" x2="520" y2="150" stroke="#ff0033" stroke-width="1"/>
  <line x1="720" y1="150" x2="760" y2="150" stroke="#ff0033" stroke-width="1"/>
  <line x1="140" y1="230" x2="140" y2="280" stroke="#ff0033" stroke-width="1"/>

  <text x="40" y="450" fill="#8a8680" font-family="ui-monospace,monospace" font-size="11">Migrations: sql/forum_setup.sql + migration_add_signature.sql</text>
  <text x="40" y="470" fill="#8a8680" font-family="ui-monospace,monospace" font-size="11">+ migration_blog_phase1.sql · phase2.sql · phase3_4.sql</text>
  <text x="40" y="500" fill="#5a5650" font-family="ui-monospace,monospace" font-size="11">PDO · prepared statements · utf8mb4</text>

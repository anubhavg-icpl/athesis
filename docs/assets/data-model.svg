  <text x="775" y="95" fill="#ff0033" font-family="ui-monospace,monospace" font-size="12">editorial</text>
  <text x="775" y="120" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">blog_revisions</text>
  <text x="775" y="140" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">blog_media</text>

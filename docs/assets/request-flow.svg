<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#000"/>
  <text x="40" y="36" fill="#ff0033" font-family="ui-monospace,monospace" font-size="14" letter-spacing="3">ATHESIS · REQUEST FLOW</text>

  <!-- steps -->
  <rect x="40" y="80" width="140" height="70" fill="#050505" stroke="#ff0033"/>
  <text x="110" y="110" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">1. Request</text>
  <text x="110" y="130" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">HTTP → Apache</text>

  <text x="195" y="120" fill="#ff0033" font-family="ui-monospace,monospace" font-size="18">→</text>

  <rect x="220" y="80" width="140" height="70" fill="#050505" stroke="#1a1a1a"/>
  <text x="290" y="110" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">2. Bootstrap</text>
  <text x="290" y="130" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">config.php</text>

  <text x="375" y="120" fill="#ff0033" font-family="ui-monospace,monospace" font-size="18">→</text>

  <rect x="400" y="80" width="140" height="70" fill="#050505" stroke="#1a1a1a"/>
  <text x="470" y="110" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">3. Security</text>
  <text x="470" y="130" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">session · CSP</text>

  <text x="555" y="120" fill="#ff0033" font-family="ui-monospace,monospace" font-size="18">→</text>

  <rect x="580" y="80" width="140" height="70" fill="#050505" stroke="#1a1a1a"/>
  <text x="650" y="110" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">4. Page logic</text>
  <text x="650" y="130" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">public/*.php</text>

  <text x="735" y="120" fill="#ff0033" font-family="ui-monospace,monospace" font-size="18">→</text>

  <rect x="760" y="80" width="160" height="70" fill="#050505" stroke="#ff0033"/>
  <text x="840" y="110" text-anchor="middle" fill="#e8e4e0" font-family="ui-monospace,monospace" font-size="12">5. Render</text>
  <text x="840" y="130" text-anchor="middle" fill="#8a8680" font-family="ui-monospace,monospace" font-size="10">header · body · footer</text>

  <!-- detail boxes -->
  <rect x="40" y="200" width="280" height="170" fill="#050505" stroke="#1a1a1a"/>
  <text x="55" y="230" fill="#ff0033" font-family="ui-monospace,monospace" font-size="12">Auth path</text>
  <text x="55" y="255" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">login → session + CSRF</text>
  <text x="55" y="275" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">require_login() gates write</text>
  <text x="55" y="295" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">roles: user author mod admin</text>
  <text x="55" y="315" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">is_member → paywall</text>
  <text x="55" y="345" fill="#5a5650" font-family="ui-monospace,monospace" font-size="10">bcrypt · rate limits</text>

  <rect x="340" y="200" width="280" height="170" fill="#050505" stroke="#1a1a1a"/>
  <text x="355" y="230" fill="#ff0033" font-family="ui-monospace,monospace" font-size="12">Forum path</text>
  <text x="355" y="255" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">topics → search/sort</text>
  <text x="355" y="275" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">view_topic + replies</text>
  <text x="355" y="295" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">create / edit topic+reply</text>
  <text x="355" y="315" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">signature under posts</text>
  <text x="355" y="345" fill="#5a5650" font-family="ui-monospace,monospace" font-size="10">full-row clickable lists</text>

  <rect x="640" y="200" width="280" height="170" fill="#050505" stroke="#1a1a1a"/>
  <text x="655" y="230" fill="#ff0033" font-family="ui-monospace,monospace" font-size="12">Blog path</text>
  <text x="655" y="255" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">index · post · write</text>
  <text x="655" y="275" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">admin · media · moderate</text>
  <text x="655" y="295" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">rss · sitemap · archive</text>
  <text x="655" y="315" fill="#cfcbc6" font-family="ui-monospace,monospace" font-size="11">series · paywall · TOC</text>
  <text x="655" y="345" fill="#5a5650" font-family="ui-monospace,monospace" font-size="10">lazy publish scheduled</text>
</svg>

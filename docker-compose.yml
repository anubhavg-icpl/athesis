services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-athesis}
      POSTGRES_USER: ${POSTGRES_USER:-athesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-athesispass}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Fresh-build schema (Postgres + pgvector). Runs once on an empty data volume.
      - ./sql/schema_pg.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athesis} -d ${POSTGRES_DB:-athesis}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-athesis}
      DB_USER: ${POSTGRES_USER:-athesis}
      DB_PASS: ${POSTGRES_PASSWORD:-athesispass}
      APP_DEBUG: ${APP_DEBUG:-0}
      AGENT_API_KEY: ${AGENT_API_KEY:-changeme-dev-key}
      FORUM_NAME: ${FORUM_NAME:-AGORA}
    ports:
      - "8088:80"
    restart: unless-stopped

volumes:
  db_data:

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-php_forum}
      MYSQL_USER: ${MYSQL_USER:-forum}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-forumpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    volumes:
      - db_data:/var/lib/mysql
      # Docker-safe seed (no CREATE/USE lines that break on existing DB)
      - ./sql/forum_setup.sql:/docker-entrypoint-initdb.d/01_forum_setup.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE:-php_forum}
      DB_USER: ${MYSQL_USER:-forum}
      DB_PASS: ${MYSQL_PASSWORD:-forumpass}
      APP_DEBUG: ${APP_DEBUG:-0}
    ports:
      - "8088:80"
    restart: unless-stopped

volumes:
  db_data:
